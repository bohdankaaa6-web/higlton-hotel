<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Success | Higlton</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body style="background-color: #FAFAFA">

    <div class="success-page">
        <div class="success-container active">
            <!-- Ваша гіфка з капібарою у ванні -->
            <img src="images/capy-bath.gif" alt="Happy Capybara" class="success-capy">
            
            <h1 data-i18n="book_success_title">Booking Confirmed!</h1>
            <p class="success-desc" data-i18n="book_success_desc">Your luxury suite is waiting for you...</p>
            
            <a href="profile.html" class="btn-book-now success-btn" data-i18n="book_success_btn">View My Bookings</a>
            
            <p class="redirect-notice">
                <span data-i18n="success_redirect_1">Redirecting in </span>
                <span id="seconds" class="countdown">5</span>
                <span data-i18n="success_redirect_2"> seconds...</span>
            </p>
        </div>
    </div>

    <script src="lang.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let timeLeft = 5;
            const countdownEl = document.getElementById('seconds');
            
            const timer = setInterval(() => {
                timeLeft--;
                if (countdownEl) countdownEl.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = "profile.html";
                }
            }, 1000);
        });
    </script>
</body>
</html>
