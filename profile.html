<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Higlton</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body style="background-color: #FAFAFA">
    <!-- Кнопка повернення назад для Профілю -->
    <a href="index.html" class="back-home-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span data-i18n="nav_back_home">Back to Home</span>
    </a>
   

    <main class="profile-page" style="margin-top: 120px; padding-bottom: 80px;">
        <div class="header__container">
            <h1 style="font-family: 'Playfair Display', serif; font-size: 36px; color: var(--dark); margin-bottom: 30px;" data-i18n="prof_title">My Account</h1>
            
            <div class="profile-layout">
                <!-- Бокове меню -->
                <aside class="profile-sidebar">
                    <div class="user-info">
                        <div class="user-avatar">👤</div>
                        <h3 id="user-name-display">Guest</h3>
                        <p id="user-email-display">guest@higlton.com</p>
                        <!-- Новий бейдж для статусу -->
                        <div id="user-role-badge" class="user-role-badge">Guest</div>
                        <button id="logout-btn" class="logout-link" data-i18n="prof_logout">Log Out</button>
                    </div>
                    <nav class="profile-nav">
                        <!-- Меню для звичайного користувача -->
                        <button class="tab-btn user-only active" data-tab="bookings" data-i18n="prof_tab_book">My Bookings</button>
                        <button class="tab-btn user-only" data-tab="wishlist" data-i18n="prof_tab_wish">Wishlist</button>
                        <button class="tab-btn user-only" data-tab="discounts" data-i18n="prof_tab_disc">My Discounts</button>
                        
                        <!-- Меню для Адміністратора (приховане за замовчуванням) -->
                        <!-- Меню для Адміністратора (приховане за замовчуванням) -->
                        <button class="tab-btn admin-only" data-tab="all-bookings" data-i18n="prof_admin_tab_bookings" style="display: none;">All Bookings</button>
                        <button class="tab-btn admin-only" data-tab="manage-rooms" data-i18n="prof_admin_tab_rooms" style="display: none;">Manage Rooms</button>
                    </nav>
                </aside>

                <!-- Контент профілю -->
                <div class="profile-content">
                    
                    <!-- Вкладки Користувача (залишаються як були) -->
                    <section id="bookings" class="tab-content user-only active">
                        <h2 data-i18n="prof_tab_book">My Bookings</h2>
                        <div id="bookings-list" class="items-list"></div>
                    </section>

                    <section id="wishlist" class="tab-content user-only">
                        <h2 data-i18n="prof_tab_wish">Wishlist</h2>
                        <div id="wishlist-grid" class="rooms__grid" style="padding: 0; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;"></div>
                    </section>

                    <section id="discounts" class="tab-content user-only">
                        <h2 data-i18n="prof_tab_disc">My Discounts</h2>
                        <div class="discount-card">
                            <div class="discount-icon">🎁</div>
                            <div class="discount-info">
                                <h3 data-i18n="prof_disc_1_title">Welcome Bonus</h3>
                                <p data-i18n="prof_disc_1_desc">10% off your next booking</p>
                            </div>
                            <div class="discount-code">HIGLTON10</div>
                        </div>
                        <div id="loyal-discount" class="discount-card" style="display: none;">
                            <div class="discount-icon">👑</div>
                            <div class="discount-info">
                                <h3 data-i18n="prof_disc_2_title">Loyalty Member</h3>
                                <p data-i18n="prof_disc_2_desc">Free Spa access included in all stays</p>
                            </div>
                            <div class="discount-code">Active</div>
                        </div>
                    </section>

                    <!-- Вкладки Адміністратора -->
                    <section id="all-bookings" class="tab-content admin-only">
                        <h2 data-i18n="prof_admin_title_bookings">Manage All Bookings</h2>
                        <div id="admin-bookings-list" class="items-list">
                            <!-- JS додасть всі бронювання -->
                        </div>
                    </section>

                    <section id="manage-rooms" class="tab-content admin-only">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                            <h2 style="margin-bottom: 0;" data-i18n="prof_admin_title_rooms">Manage Rooms</h2>
                            <button class="btn-add-room" data-i18n="prof_admin_btn_add_room">+ Add Room</button>
                        </div>
                        <div id="admin-rooms-list" class="items-list">
                            <p style="color:var(--gray)">Room management interface will be here...</p>
                        </div>
                    </section>

                </div>
            </div>
        </div>
    </main>


    <script src="lang.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 0. Визначаємо поточну мову (з пам'яті або за замовчуванням 'en')
            const currentLang = localStorage.getItem('site_language') || 'en';

            // Функція безпечного отримання перекладу (запобігає появі "undefined")
            function getTranslation(key, defaultText) {
                if (typeof translations !== 'undefined' && translations[currentLang] && translations[currentLang][key]) {
                    return translations[currentLang][key];
                }
                return defaultText || key;
            }
            // Робимо функцію глобальною, щоб вона була доступною в інших блоках <script>
            window.getTranslation = getTranslation;


            // 1. Отримуємо юзера
            const currentUser = JSON.parse(localStorage.getItem('higlton_user'));
            if(!currentUser) {
                window.location.href = "getstarted.html";
                return;
            }
            
            const userRole = (currentUser.role || 'user').toLowerCase();

            // 2. Встановлюємо дані користувача
            document.getElementById('user-name-display').innerText = currentUser.firstName || "Guest";
            document.getElementById('user-email-display').innerText = currentUser.email || "user@higlton.com";

            const roleBadge = document.getElementById('user-role-badge');
            if (userRole === 'admin') {
                roleBadge.innerText = 'Administrator';
                roleBadge.classList.add('admin-badge');
            } else {
                roleBadge.innerText = 'Guest';
            }

            // 3. Логіка відображення вкладок
            if (userRole === 'admin') {
                document.querySelectorAll('.user-only').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                
                document.querySelector('.tab-btn[data-tab="bookings"]').classList.remove('active');
                document.getElementById('bookings').classList.remove('active');
                document.querySelector('.tab-btn[data-tab="all-bookings"]').classList.add('active');
                document.getElementById('all-bookings').classList.add('active');

                renderAdminBookings();
            } else {
                renderUserBookings();
                renderUserWishlist();
            }

            // 4. Перемикання вкладок
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.getAttribute('data-tab')).classList.add('active');
                });
            });

            // 5. Вихід
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('higlton_user');
                localStorage.removeItem('username');
                window.location.href = "index.html";
            });

            // --- Глобальна функція оновлення статусу замовлення через API ---
            window.updateBookingStatus = function(bookingId, newStatus) {
                fetch(`http://localhost:8081/api/bookings/${bookingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus, checkIn: null, checkOut: null }) // сервер оновить тільки status
                })
                .then(res => {
                    if (!res.ok) throw new Error('Update failed');
                    renderAdminBookings();
                })
                .catch(err => {
                    console.error('Status update error:', err);
                    alert('Failed to update booking status. Please try again.');
                });
            };

            // --- ФУНКЦІЇ РЕНДЕРУ З ПЕРЕКЛАДОМ ---

            function renderUserBookings() {
                const bookingsList = document.getElementById('bookings-list');
                bookingsList.innerHTML = `<p style="color:var(--gray)">Loading bookings...</p>`;

                fetch('http://localhost:8081/api/bookings')
                    .then(res => res.json())
                    .then(allBookings => {
                        const myBookings = allBookings.filter(b =>
                            b.client && b.client.id === currentUser.id
                        );

                        if (myBookings.length === 0) {
                            bookingsList.innerHTML = `<p style="color:var(--gray)">${getTranslation('prof_no_bookings', "You don't have any bookings yet.")}</p>`;
                            return;
                        }

                        bookingsList.innerHTML = myBookings.reverse().map(b => {
                            const status = (b.status || 'PENDING').toUpperCase();
                            let statusText, badgeClass;

                            if (status === 'CONFIRMED') {
                                statusText = getTranslation('prof_status_confirmed', 'Confirmed');
                                badgeClass = 'status-approved';
                            } else if (status === 'CANCELLED') {
                                statusText = getTranslation('prof_status_cancelled', 'Cancelled');
                                badgeClass = 'status-cancelled';
                            } else {
                                statusText = getTranslation('prof_status_pending', 'Pending');
                                badgeClass = 'status-pending';
                            }

                            const roomTitle = b.room ? (b.room.title || 'Room #' + b.room.id) : 'Suite';
                            const totalPrice = b.totalPrice ? ` | <strong>Total:</strong> $${b.totalPrice}` : '';

                            return `
                                <div class="booking-item">
                                    <div class="book-info">
                                        <h4>${roomTitle}</h4>
                                        <p><strong>${getTranslation('prof_checkin', 'Check-in')}:</strong> ${b.checkIn} | <strong>${getTranslation('prof_checkout', 'Check-out')}:</strong> ${b.checkOut}${totalPrice}</p>
                                    </div>
                                    <span class="status-badge ${badgeClass}">${statusText}</span>
                                </div>
                            `;
                        }).join('');

                        const hasConfirmed = myBookings.some(b => (b.status || '').toUpperCase() === 'CONFIRMED');
                        document.getElementById('loyal-discount').style.display = hasConfirmed ? 'flex' : 'none';
                    })
                    .catch(err => {
                        console.error('Failed to load user bookings:', err);
                        bookingsList.innerHTML = `<p style="color: #dc2626;">⚠ Could not load bookings. Make sure the backend is running.</p>`;
                    });
            }

            function renderUserWishlist() {
                const wishlistGrid = document.getElementById('wishlist-grid');
                const wishlist = JSON.parse(localStorage.getItem('higlton_wishlist')) || [];

                if(wishlist.length === 0) {
                    wishlistGrid.innerHTML = `<p style="color:var(--gray); grid-column: 1/-1;">${getTranslation('prof_empty_wishlist', 'Your wishlist is empty. Go explore our suites!')}</p>`;
                } else {
                    wishlistGrid.innerHTML = wishlist.map(item => `
                        <div class="room-card" style="flex: auto; scroll-snap-align: none;">
                            <div class="room-card__image-container">
                                <div class="badge-price"><span class="price-value">${item.price}</span></div>
                                <img src="${item.img}" alt="Room" class="room-card__img">
                            </div>
                            <div class="room-card__body">
                                <h4 class="room-card__title">${item.title}</h4>
                            </div>
                        </div>
                    `).join('');
                }
            }

            function renderAdminBookings() {
                const adminBookingsList = document.getElementById('admin-bookings-list');
                adminBookingsList.innerHTML = `<p style="color:var(--gray)">Loading bookings...</p>`;

                fetch('http://localhost:8081/api/bookings')
                    .then(res => res.json())
                    .then(bookings => {
                        if (bookings.length === 0) {
                            adminBookingsList.innerHTML = `<p style="color:var(--gray)">${getTranslation('prof_admin_no_bookings', 'No bookings in the system yet.')}</p>`;
                            return;
                        }

                        adminBookingsList.innerHTML = bookings.reverse().map((b, index) => {
                            const status = (b.status || 'PENDING').toUpperCase();
                            
                            // Визначаємо переклад статусу
                            let statusText = '';
                            if (status === 'CONFIRMED') {
                                statusText = getTranslation('prof_status_confirmed', 'Confirmed');
                            } else if (status === 'CANCELLED') {
                                statusText = getTranslation('prof_status_cancelled', 'Cancelled');
                            } else {
                                statusText = getTranslation('prof_status_pending', 'Pending');
                            }
                            
                            let statusColor = status === 'CONFIRMED' ? '#059669' : (status === 'CANCELLED' ? '#dc2626' : '#d97706');

                            const guestName = b.client ? (b.client.firstName || 'N/A') : 'N/A';
                            const guestEmail = b.client ? (b.client.email || 'N/A') : 'N/A';
                            const roomTitle = b.room ? (b.room.title || 'Room #' + b.room.id) : 'N/A';
                            const checkIn = b.checkIn || 'N/A';
                            const checkOut = b.checkOut || 'N/A';
                            const totalPrice = b.totalPrice ? `$${b.totalPrice}` : 'N/A';

                            return `
                                <div class="booking-item admin-booking-card" style="border-left: 6px solid ${statusColor};">
                                    <div class="book-info">
                                        <h4>${roomTitle} <span class="admin-ref">#${b.id}</span></h4>
                                        <p><strong>${getTranslation('prof_admin_guest', 'Guest')}:</strong> ${guestName} | <strong>${getTranslation('prof_admin_contact', 'Contact')}:</strong> ${guestEmail}</p>
                                        <p><strong>${getTranslation('prof_admin_dates', 'Dates')}:</strong> ${checkIn} → ${checkOut} | <strong>${getTranslation('prof_total', 'Total')}:</strong> ${totalPrice}</p>
                                        <p><strong>${getTranslation('prof_admin_status', 'Status')}:</strong> <span style="color: ${statusColor}; font-weight: bold;">${statusText}</span></p>
                                        ${b.comment ? `<p><strong>${getTranslation('prof_admin_comment', 'Comment')}:</strong> ${b.comment}</p>` : ''}
                                    </div>
                                    <div class="admin-actions" style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end;">
                                        ${status !== 'CONFIRMED' ? `
                                            <button onclick="updateBookingStatus(${b.id}, 'CONFIRMED')" style="background-color: #4CAF50; color: white; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 120px;">✓ ${getTranslation('prof_admin_btn_approve', 'Approve')}</button>
                                        ` : ''}
                                        ${status !== 'CANCELLED' ? `
                                            <button onclick="updateBookingStatus(${b.id}, 'CANCELLED')" style="background-color: #f44336; color: white; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 120px;">✕ ${getTranslation('prof_admin_btn_cancel', 'Cancel')}</button>
                                        ` : ''}
                                        ${status !== 'PENDING' ? `
                                            <button onclick="updateBookingStatus(${b.id}, 'PENDING')" style="background-color: #d97706; color: white; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 120px;">↺ ${getTranslation('prof_admin_btn_pending', 'Pending')}</button>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    })
                    .catch(err => {
                        console.error('Failed to load bookings:', err);
                        adminBookingsList.innerHTML = `<p style="color: #dc2626;">⚠ Could not load bookings. Make sure the backend is running on port 8081.</p>`;
                    });
            }
        });
    </script>


    <script>
    document.addEventListener('DOMContentLoaded', () => {
        
        const API_URL = "http://localhost:8081/api/rooms";

        window.deleteRoom = async function(id) {
            if (!confirm("Are you sure you want to delete this room?")) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    loadManageRooms();
                } else {
                    alert("Failed to delete room.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Connection error.");
            }
        };

        window.loadManageRooms = async function() {
            const listContainer = document.getElementById('admin-rooms-list');
            if (!listContainer) return;
            listContainer.innerHTML = `<p style="color:var(--gray)">Loading rooms...</p>`;

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch rooms');
                const rooms = await response.json();

                if (rooms.length === 0) {
                    listContainer.innerHTML = `<p style="color:var(--gray)">No rooms found. Add one using the button above.</p>`;
                    return;
                }

                listContainer.innerHTML = rooms.map(room => `
                    <div style="display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 20px; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid #bead8e; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            ${room.imageUrl ? `<img src="${room.imageUrl}" alt="${room.title}" style="width: 80px; height: 60px; object-fit: cover; border-radius: 8px;">` : ''}
                            <div>
                                <strong style="font-size: 18px; color: #333;">${room.title}</strong>
                                <p style="margin: 5px 0 0; color: #bead8e; font-weight: bold;">$${room.pricePerNight} / ${getTranslation('prof_night', 'Night')}</p>
                                <p style="margin: 2px 0 0; color: #777; font-size: 14px;">${getTranslation('prof_capacity', 'Capacity')}: ${room.capacity} ${getTranslation('prof_guests_count', 'guests')} | ${room.bedType || ''} | ${room.areaM2 || 0} m² | ID: ${room.id}</p>
                            </div>
                        </div>
                        <button onclick="deleteRoom(${room.id})" style="background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;">${getTranslation('prof_admin_delete', 'Delete')}</button>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Error loading rooms:", error);
                listContainer.innerHTML = `<p style="color: #dc2626;">⚠ Could not load rooms. Make sure the backend is running on port 8081.</p>`;
            }
        };

        // Add Room — показуємо форму замість prompt
        const addRoomBtn = document.querySelector('.btn-add-room');
        
        if (addRoomBtn) {
            addRoomBtn.addEventListener('click', (e) => {
                e.preventDefault();

                // Якщо форма вже відкрита — закриваємо
                const existing = document.getElementById('add-room-form-inline');
                if (existing) { existing.remove(); return; }

                const formHtml = `
                    <div id="add-room-form-inline" style="background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid #bead8e;">
                        <h3 style="margin: 0 0 16px; color: #333;">${getTranslation('prof_admin_add_room_title', 'Add New Room')}</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">${getTranslation('prof_admin_room_title_label', 'Room Title *')}</label>
                                <input id="new-room-title" type="text" placeholder="e.g. Luxury Suite" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
                            </div>
                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">${getTranslation('prof_admin_price_label', 'Price per Night ($) *')}</label>
                                <input id="new-room-price" type="number" placeholder="250" min="1" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
                            </div>
                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">${getTranslation('prof_admin_capacity_label', 'Capacity (guests)')}</label>
                                <input id="new-room-capacity" type="number" placeholder="2" min="1" value="2" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
                            </div>
                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">${getTranslation('prof_admin_bed_type_label', 'Bed Type')}</label>
                                <input id="new-room-bed" type="text" placeholder="King Size" value="King Size" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
                            </div>
                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">${getTranslation('prof_admin_area_label', 'Area (m²)')}</label>
                                <input id="new-room-area" type="number" placeholder="45" min="1" value="45" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
                            </div>
                            <div>
                                <label style="font-size:13px; color:#555; display:block; margin-bottom:4px;">${getTranslation('prof_admin_image_label', 'Image URL')}</label>
                                <input id="new-room-image" type="text" placeholder="https://..." style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 16px;">
                            <button id="save-new-room-btn" style="background: #bead8e; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px;">${getTranslation('prof_admin_save_btn', 'Save Room')}</button>
                            <button id="cancel-new-room-btn" style="background: #eee; color: #555; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px;">${getTranslation('prof_admin_cancel_btn', 'Cancel')}</button>
                        </div>
                        <p id="room-save-error" style="color: #dc2626; margin: 8px 0 0; display: none;"></p>
                    </div>
                `;

                const listContainer = document.getElementById('admin-rooms-list');
                listContainer.insertAdjacentHTML('beforebegin', formHtml);

                document.getElementById('cancel-new-room-btn').addEventListener('click', () => {
                    document.getElementById('add-room-form-inline').remove();
                });

                document.getElementById('save-new-room-btn').addEventListener('click', async () => {
                    const title = document.getElementById('new-room-title').value.trim();
                    const price = parseFloat(document.getElementById('new-room-price').value);
                    const capacity = parseInt(document.getElementById('new-room-capacity').value) || 2;
                    const bedType = document.getElementById('new-room-bed').value.trim() || 'King Size';
                    const areaM2 = parseFloat(document.getElementById('new-room-area').value) || 45;
                    const imageUrl = document.getElementById('new-room-image').value.trim() ||
                        'https://images.unsplash.com/photo-1590490360182-c33d57733427?w=800';
                    const errorEl = document.getElementById('room-save-error');

                    if (!title || isNaN(price) || price <= 0) {
                        errorEl.textContent = 'Please fill in Room Title and Price.';
                        errorEl.style.display = 'block';
                        return;
                    }

                    const saveBtn = document.getElementById('save-new-room-btn');
                    saveBtn.disabled = true;
                    saveBtn.textContent = 'Saving...';

                    const roomData = {
                        hotel: { id: 1 },
                        mood: { id: 1 },
                        title,
                        pricePerNight: price,
                        capacity,
                        bedType,
                        areaM2,
                        imageUrl
                    };

                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(roomData)
                        });

                        if (res.ok) {
                            document.getElementById('add-room-form-inline').remove();
                            loadManageRooms();
                        } else {
                            const errText = await res.text();
                            errorEl.textContent = 'Error: ' + errText;
                            errorEl.style.display = 'block';
                            saveBtn.disabled = false;
                            saveBtn.textContent = 'Save Room';
                        }
                    } catch (error) {
                        console.error('Error saving room:', error);
                        errorEl.textContent = 'Connection error. Make sure the backend is running.';
                        errorEl.style.display = 'block';
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Save Room';
                    }
                });
            });
        }

        // Завантажуємо кімнати при відкритті вкладки Manage Rooms
        document.querySelectorAll('.tab-btn').forEach(tab => {
            tab.addEventListener('click', () => {
                if (tab.getAttribute('data-tab') === 'manage-rooms') {
                    loadManageRooms();
                }
                if (tab.getAttribute('data-tab') === 'all-bookings') {
                    renderAdminBookings();
                }
            });
        });

        loadManageRooms();
    });
    </script>


</body>
</html>
