<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container" id="auth-container">
            <div class="form-box login">
                <form id="loginForm">
                    <h1>Login</h1>
                    <div class="input-box">
                        <input type="text" id="login-user" placeholder="Username" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="login-pass" placeholder="Password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <div class="forgot-link"><a href="#">Forgot Password?</a></div>
                    <button type="submit" class="btn">Login</button>
                    <p>or login with social platforms</p>
                    <div class="social-icons">
                        <a href="#"><i class="fa-brands fa-google"></i></a>
                        <a href="#"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                    <p class="mobile-text">Don't have an account? <b id="to-reg-mobile">Register</b></p>
                </form>
            </div>

            <div class="form-box registration">
                <form id="regForm">
                    <h1>Registration</h1>
                    <div class="input-box">
                        <input type="text" id="reg-firstName" placeholder="Username" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="email" id="reg-email" placeholder="Email" required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="reg-password" placeholder="Password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <button type="submit" class="btn">Register</button>
                    <div class="social-icons">
                        <a href="#"><i class="fa-brands fa-google"></i></a>
                        <a href="#"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                    <p class="mobile-text">Already have an account? <b id="to-login-mobile">Login</b></p>
                </form>
            </div>

            <div class="toggle-box">
                <div class="toggle-panel toggle-left">
                    <img src="images/getstarted/capybam-safetycapybam.gif" alt="Capy" class="auth-capy-img">
                    <h1>Hello, Welcome!</h1>
                    <p>Don't have an account?</p>
                    <button class="btn registration-btn">Registration</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <img src="images/getstarted/coffee-bara-capybara.gif" alt="Capy" class="auth-capy-img">
                    <h1>Welcome Back!</h1>
                    <p>Already have an account?</p>
                    <button class="btn login-btn">Login</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const authContainer = document.getElementById('auth-container');
        const registerBtn = document.querySelector('.registration-btn');
        const loginBtn = document.querySelector('.login-btn');
        
        // 1. Перемикання для ПК (синя плашка)
        registerBtn.addEventListener('click', () => authContainer.classList.add("active"));
        loginBtn.addEventListener('click', () => authContainer.classList.remove("active"));

        // 2. Перемикання для МОБІЛОК (текстові посилання)
        const toRegMobile = document.getElementById('to-reg-mobile');
        const toLoginMobile = document.getElementById('to-login-mobile');

        if (toRegMobile) {
            toRegMobile.addEventListener('click', () => authContainer.classList.add("active"));
        }
        if (toLoginMobile) {
            toLoginMobile.addEventListener('click', () => authContainer.classList.remove("active"));
        }

        // 3. Анімація капібари при введенні пароля (лише для ПК, бо на мобілці вона прихована)
        const passInput = document.getElementById('login-pass');
        // Беремо картинку, яка зараз видима
        passInput.addEventListener('focus', () => {
            const capyImg = document.querySelector('.auth-container:not(.active) .toggle-right .auth-capy-img');
            if(capyImg) {
                capyImg.style.transform = 'scale(0.8) translateY(20px)';
                capyImg.style.opacity = '0.5';
            }
        });

        passInput.addEventListener('blur', () => {
            const capyImg = document.querySelector('.auth-container:not(.active) .toggle-right .auth-capy-img');
            if(capyImg) {
                capyImg.style.transform = 'scale(1) translateY(0)';
                capyImg.style.opacity = '1';
            }
        });

        // 4. ОБРОБКА РЕЄСТРАЦІЇ 
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const clientData = {
                firstName: document.getElementById('reg-firstName').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value
            };
            try {
                const response = await fetch('http://localhost:8081/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(clientData)
                });
                if (response.ok) {
                    window.location.href = 'success.html';
                } else {
                    const resultMessage = await response.text();
                    alert(resultMessage || 'Помилка реєстрації.');
                }
            } catch (error) {
                alert('Не вдалося з’єднатися з сервером.');
            }
        };

        // 5. ОБРОБКА ЛОГІНУ 
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const loginData = {
                firstName: document.getElementById('login-user').value,
                password: document.getElementById('login-pass').value
            };
            try {
                const response = await fetch('http://localhost:8081/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('higlton_user', JSON.stringify(user));
                    alert(`Вітаємо, ${user.firstName}!`);
                    window.location.href = 'index.html';
                } else {
                    alert('Невірний username або пароль');
                }
            } catch (error) {
                alert('Не вдалося з’єднатися з сервером.');
            }
        };
    </script>
    <script src="lang.js"></script>
</body>
</html>
